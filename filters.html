<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student GPA Explorer – Filters</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0fafa; color: #0d1b2a; }
  header { background: #0f6b6b; padding: 20px 32px; }
  header h1 { color: #fff; font-size: 24px; font-weight: 700; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .filters { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
  label { font-size: 13px; font-weight: 600; color: #0f6b6b; }
  input[type=range] { width: 100%; accent-color: #0f6b6b; }
  select, input[type=number] { padding: 7px 10px; border: 1px solid #9fe1cb; border-radius: 6px; font-size: 13px; outline: none; background: #f0fafa; }
  .count-badge { background: #e1f5ee; color: #085041; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; align-self: flex-end; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  thead tr { background: #0f6b6b; color: #fff; }
  th { padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; }
  td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #e1f5ee; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: #f0fafa; }
  .gpa-cell { font-weight: 700; color: #0f6b6b; }
  .no-results { text-align: center; padding: 32px; color: #5f5e5a; font-size: 14px; }
  footer { text-align: center; padding: 20px; font-size: 12px; color: #5f5e5a; }
</style>
</head>
<body>
<header><h1>Student GPA Explorer</h1></header>
<div class="container">
  <div class="filters">
    <div class="filter-group">
      <label>Min Study Hours: <span id="hoursVal">0</span> hrs/week</label>
      <input type="range" id="hoursSlider" min="0" max="40" value="0" oninput="update()">
      <small id="hoursLabel" style="font-size:12px;color:#0f6b6b;">Showing students who study at least 0 hours/week</small>
    </div>
    <div class="filter-group">
      <label>Extracurricular Activities</label>
      <select id="actFilter" onchange="update()">
        <option value="All">All</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Min College GPA</label>
      <input type="number" id="gpaFilter" min="0" max="4" step="0.1" value="0" oninput="update()" placeholder="e.g. 3.0">
    </div>
    <span class="count-badge" id="countBadge">Showing 20 of 20 students</span>
  </div>
  <table>
    <thead><tr>
      <th>Study Hours/Week</th><th>Attendance Rate (%)</th>
      <th>Previous GPA</th><th>Activities</th><th>College GPA</th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<footer>Data source: College GPA Prediction Dataset, Kaggle (Peter Mushemi).</footer>
<script>
const students = [
  [8,62,2.1,"No",2.0],[12,75,2.5,"Yes",2.6],[20,85,3.0,"No",3.1],
  [25,90,3.5,"Yes",3.7],[5,55,1.8,"No",1.9],[18,80,2.8,"Yes",2.9],
  [30,95,3.8,"No",3.9],[15,78,2.7,"No",2.8],[22,88,3.2,"Yes",3.4],
  [10,70,2.3,"Yes",2.4],[28,92,3.6,"No",3.6],[6,60,2.0,"No",2.0],
  [17,82,2.9,"Yes",3.0],[24,87,3.3,"No",3.3],[9,65,2.2,"No",2.1],
  [35,97,3.9,"Yes",4.0],[14,76,2.6,"Yes",2.7],[19,84,3.1,"No",3.2],
  [11,72,2.4,"No",2.3],[27,91,3.7,"Yes",3.8]
];
function update() {
  const minHrs = parseInt(document.getElementById("hoursSlider").value);
  const act = document.getElementById("actFilter").value;
  const minGpa = parseFloat(document.getElementById("gpaFilter").value) || 0;
  document.getElementById("hoursVal").textContent = minHrs;
  document.getElementById("hoursLabel").textContent = `Showing students who study at least ${minHrs} hours/week`;
  const filtered = students.filter(s => s[0] >= minHrs && (act === "All" || s[3] === act) && s[4] >= minGpa);
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="no-results">No students match these filters.</td></tr>`;
  } else {
    filtered.forEach(s => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${s[0]}</td><td>${s[1]}%</td><td>${s[2].toFixed(1)}</td><td>${s[3]}</td><td class="gpa-cell">${s[4].toFixed(1)}</td>`;
      tbody.appendChild(tr);
    });
  }
  document.getElementById("countBadge").textContent = `Showing ${filtered.length} of ${students.length} students`;
}
update();
</script>
</body>
</html>
