<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student GPA Explorer – Chart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0fafa; color: #0d1b2a; }
  header { background: #0f6b6b; padding: 20px 32px; }
  header h1 { color: #fff; font-size: 24px; font-weight: 700; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .filters { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 190px; }
  label { font-size: 13px; font-weight: 600; color: #0f6b6b; }
  input[type=range] { width: 100%; accent-color: #0f6b6b; }
  select, input[type=number] { padding: 7px 10px; border: 1px solid #9fe1cb; border-radius: 6px; font-size: 13px; background: #f0fafa; }
  .count-badge { background: #e1f5ee; color: #085041; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .chart-card { background: #fff; border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .chart-card h2 { font-size: 16px; color: #0f6b6b; margin-bottom: 16px; }
  .legend { display: flex; gap: 20px; font-size: 12px; margin-top: 12px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  thead tr { background: #0f6b6b; color: #fff; }
  th { padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; }
  td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #e1f5ee; }
  tr:nth-child(even) td { background: #f0fafa; }
  .gpa-cell { font-weight: 700; color: #0f6b6b; }
  footer { text-align: center; padding: 20px; font-size: 12px; color: #5f5e5a; }
</style>
</head>
<body>
<header><h1>Student GPA Explorer</h1></header>
<div class="container">
  <div class="filters">
    <div class="filter-group">
      <label>Min Study Hours: <span id="hoursVal">0</span>/week</label>
      <input type="range" id="hoursSlider" min="0" max="40" value="0" oninput="update()">
    </div>
    <div class="filter-group">
      <label>Activities</label>
      <select id="actFilter" onchange="update()">
        <option>All</option><option>Yes</option><option>No</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Min GPA</label>
      <input type="number" id="gpaFilter" min="0" max="4" step="0.1" value="0" oninput="update()">
    </div>
    <span class="count-badge" id="countBadge">20 of 20 students</span>
  </div>

  <div class="chart-card">
    <h2>Study Hours vs. College GPA</h2>
    <canvas id="scatterChart" height="90"></canvas>
    <div class="legend">
      <span><span class="legend-dot" style="background:#1d9e75;"></span>With activities</span>
      <span><span class="legend-dot" style="background:#d85a30;"></span>Without activities</span>
    </div>
  </div>

  <table>
    <thead><tr>
      <th>Study Hours/Week</th><th>Attendance (%)</th>
      <th>Previous GPA</th><th>Activities</th><th>College GPA</th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<footer>Data source: College GPA Prediction Dataset, Kaggle (Peter Mushemi).</footer>
<script>
const all = [
  [8,62,2.1,"No",2.0],[12,75,2.5,"Yes",2.6],[20,85,3.0,"No",3.1],
  [25,90,3.5,"Yes",3.7],[5,55,1.8,"No",1.9],[18,80,2.8,"Yes",2.9],
  [30,95,3.8,"No",3.9],[15,78,2.7,"No",2.8],[22,88,3.2,"Yes",3.4],
  [10,70,2.3,"Yes",2.4],[28,92,3.6,"No",3.6],[6,60,2.0,"No",2.0],
  [17,82,2.9,"Yes",3.0],[24,87,3.3,"No",3.3],[9,65,2.2,"No",2.1],
  [35,97,3.9,"Yes",4.0],[14,76,2.6,"Yes",2.7],[19,84,3.1,"No",3.2],
  [11,72,2.4,"No",2.3],[27,91,3.7,"Yes",3.8]
];
const ctx = document.getElementById("scatterChart").getContext("2d");
const chart = new Chart(ctx, {
  type: "scatter",
  data: { datasets: [
    { label: "With Activities", data: [], backgroundColor: "#1d9e75", pointRadius: 7, pointHoverRadius: 9 },
    { label: "No Activities",   data: [], backgroundColor: "#d85a30", pointRadius: 7, pointHoverRadius: 9 }
  ]},
  options: {
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => {
        const p = ctx.raw;
        return [`Study: ${p.x} hrs/week`, `Attend: ${p.att}%`, `Activities: ${p.act}`, `GPA: ${p.y}`];
      }}}
    },
    scales: {
      x: { title: { display: true, text: "Study Hours/Week", color: "#0f6b6b" }, min: 0, max: 40 },
      y: { title: { display: true, text: "College GPA (0-4)", color: "#0f6b6b" }, min: 0, max: 4.5 }
    }
  }
});
function update() {
  const minH = +document.getElementById("hoursSlider").value;
  const act  = document.getElementById("actFilter").value;
  const minG = parseFloat(document.getElementById("gpaFilter").value) || 0;
  document.getElementById("hoursVal").textContent = minH;
  const filtered = all.filter(s => s[0] >= minH && (act === "All" || s[3] === act) && s[4] >= minG);
  chart.data.datasets[0].data = filtered.filter(s => s[3] === "Yes").map(s => ({x: s[0], y: s[4], att: s[1], act: s[3]}));
  chart.data.datasets[1].data = filtered.filter(s => s[3] === "No" ).map(s => ({x: s[0], y: s[4], att: s[1], act: s[3]}));
  chart.update();
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  filtered.forEach(s => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${s[0]}</td><td>${s[1]}%</td><td>${s[2].toFixed(1)}</td><td>${s[3]}</td><td class="gpa-cell">${s[4].toFixed(1)}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById("countBadge").textContent = `${filtered.length} of ${all.length} students`;
}
update();
</script>
</body>
</html>
